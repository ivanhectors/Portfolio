<style>
        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 0.4s ease, color 0.4s ease;
        }
        html { scroll-behavior: smooth; }

        /* Variable Theme Engine yang Dioptimalkan Kecerahannya */
        :root {
            --background: 210 20% 98%;
            --foreground: 220 10% 10%;
            --card-bg: 255 255 255;
            --card-border: 214 32% 91%;
            --glass-panel-rgb: 255 255 255;
            --glass-opacity: 0.7;
            --orb-1: #e0e7ff; --orb-2: #f3e8ff;
            --text-main: #0f172a;
            --text-muted: #475569;
        }
        
        /* DARK MODE - Dibuat lebih hidup, tidak terlalu pekat gelapnya */
        html.dark {
            --background: 222 47% 6%;
            --foreground: 210 40% 98%;
            --card-bg: 222 47% 10%;
            --card-border: 217 32% 22%;
            --glass-panel-rgb: 30 41 59; /* Menggunakan basis Slate-800 agar kartu lebih terang */
            --glass-opacity: 0.55; /* Menaikkan opasitas agar efek kaca lebih hidup */
            --orb-1: #312e81; --orb-2: #1e1b4b;
            --text-main: #f8fafc; /* Memaksa font menjadi putih cerah di dark mode */
            --text-muted: #cbd5e1; /* Memaksa font sekunder tetap terbaca jelas */
        }

        body { 
            background-color: hsl(var(--background)); 
            color: var(--text-main); 
        }

        /* Sinkronisasi warna font global agar tidak tertimpa */
        h1, h2, h3, h4, th, td, strong { color: var(--text-main) !important; }
        p, span, label, a { color: var(--text-muted); }
        
        /* Memastikan tombol navigasi dan brand tetap cerah */
        #navBrand, #mainNavLinks a, #allWorkViewBtn { color: var(--text-main) !important; }

        /* Efek Kaca Premium yang memantulkan warna */
        .glass-panel {
            background: rgba(var(--glass-panel-rgb) / var(--glass-opacity));
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid hsl(var(--card-border));
        }

        /* Modifikasi hover agar memancarkan aura neon indigo tipis di dark mode */
        .glass-panel-hover {
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .glass-panel-hover:hover {
            transform: translateY(-6px);
            background: rgba(var(--glass-panel-rgb) / calc(var(--glass-opacity) + 0.15));
            box-shadow: 0 20px 40px -15px rgba(99, 102, 241, 0.15);
            border-color: rgba(99, 102, 241, 0.4);
        }

        /* Latar Belakang Orbs yang Lembut */
        @keyframes orb-float-1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(8vw, -12vh) scale(1.05); }
            66% { transform: translate(-8vw, 12vh) scale(0.95); }
        }
        @keyframes orb-float-2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(-12vw, 8vh) scale(0.95); }
            66% { transform: translate(8vw, -8vh) scale(1.05); }
        }
        .orb { position: fixed; border-radius: 50%; filter: blur(100px); z-index: 0; opacity: 0.65; pointer-events: none; }
        .orb-1 { width: 55vw; height: 55vw; background: radial-gradient(circle, var(--orb-1) 0%, transparent 65%); top: -15vh; left: -15vw; animation: orb-float-1 22s ease-in-out infinite; }
        .orb-2 { width: 50vw; height: 50vw; background: radial-gradient(circle, var(--orb-2) 0%, transparent 65%); bottom: -10vh; right: -10vw; animation: orb-float-2 26s ease-in-out infinite; }
        
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .accordion-open .accordion-content { max-height: 500px; }
        .accordion-open .chevron-icon { transform: rotate(180deg); color: var(--text-main) !important; }
        
        /* Setelan warna input form agar kontras di mode gelap */
        input, textarea {
            color: var(--text-main) !important;
            background-color: rgba(var(--glass-panel-rgb) / 0.3) !important;
        }
    </style>
